<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Wedding Invitation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Google font for calligraphy -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Tangerine:wght@700&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Screen 1: Envelope -->
    <section id="screen-envelope" class="screen screen--active">
      <div class="envelope-wrapper">
        <div class="envelope">
          <div class="envelope-top"></div>
          <div class="envelope-body"></div>
          <button id="seal-btn" class="seal-btn" aria-label="Open invitation">
            <span class="seal-inner">💍</span>
          </button>
        </div>
        <p class="envelope-text">Tap to open your invitation</p>
      </div>
    </section>

    <!-- Screen 2: Invitation -->
    <section id="screen-invite" class="screen screen--hidden">
      <div class="invite-card">
        <div class="invite-flower-bg"></div>
        <div class="invite-header">
          <div class="invite-initials" id="invite-initials">K & C</div>
        </div>
        <div class="invite-names">
          <div class="invite-name-main" id="invite-names-main">
            <!-- Filled by JS -->
          </div>
          <div class="invite-name-surnames" id="invite-names-surnames">
            <!-- Filled by JS -->
          </div>
        </div>
        <div class="invite-details">
          <p class="invite-date" id="invite-date"></p>
          <p class="invite-venue" id="invite-venue"></p>
          <p class="invite-text" id="invite-text"></p>
        </div>
      </div>

      <!-- Bottom actions -->
      <div class="invite-actions">
        <button
          id="map-btn"
          class="action-btn"
          type="button"
          aria-label="Open map"
        >
          📍
          <span>Map</span>
        </button>
        <button
          id="rsvp-btn"
          class="action-btn action-btn--primary"
          type="button"
        >
          ✉️ RSVP
        </button>
      </div>
    </section>

    <!-- Screen 3: RSVP Modal -->
    <div id="rsvp-modal" class="modal">
      <div class="modal-backdrop" id="modal-close"></div>
      <div class="modal-content">
        <button class="modal-close" id="modal-close-btn" aria-label="Close">
          ×
        </button>
        <h2 class="modal-title">Confirm your presence</h2>
        <p class="modal-sub">Please fill your details</p>
        <form id="rsvp-form" class="modal-form">
          <label class="form-field">
            <span>Name</span>
            <input type="text" name="name" required placeholder="Your name" />
          </label>
          <label class="form-field">
            <span>Phone / WhatsApp</span>
            <input type="tel" name="phone" required placeholder="+230..." />
          </label>
          <label class="form-field">
            <span>Will you attend?</span>
            <select name="attendance" required>
              <option value="yes">Yes, I will be there</option>
              <option value="no">Sorry, I cannot</option>
            </select>
          </label>
          <button type="submit" class="submit-btn">Send</button>
          <p id="rsvp-msg" class="form-msg"></p>
        </form>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
